name: 仓库保活

on:
  schedule:
    # 每30天运行一次，避免仓库未更新导致 Actions 被禁用
    - cron: '0 0 */30 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 更新保活时间戳
        run: |
          mkdir -p .github
          cat > .github/KEEPALIVE.md << EOF
          # Repository Keepalive

          This file is automatically updated to keep the repository active.

          **Last Update:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Workflow Run:** #${{ github.run_number }}
          **Trigger:** ${{ github.event_name }}

          ---
          *Auto-generated by [仓库保活 workflow](.github/workflows/仓库保活.yml)*
          EOF

      - name: 提交并推送
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add .github/KEEPALIVE.md

          if git diff --staged --quiet; then
            echo "无变更"
          else
            git commit -m "chore: keepalive at $(date -u +'%Y-%m-%d')"
            git push
            echo "保活提交成功"
          fi
